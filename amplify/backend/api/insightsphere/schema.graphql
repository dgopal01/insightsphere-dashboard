# GraphQL Schema for InsightSphere Dashboard
# This schema defines the data models for chat logs and feedback

# ChatLog model - Read-only access to existing chat logs
# This table is pre-populated by the AI chatbot system
type ChatLog @model @auth(rules: [{ allow: private, operations: [read] }]) {
  id: ID!
  conversationId: String! @index(name: "byConversation", sortKeyFields: ["timestamp"])
  userId: String! @index(name: "byUser", sortKeyFields: ["timestamp"])
  timestamp: AWSDateTime!
  userMessage: String!
  aiResponse: String!
  responseTime: Int!
  accuracy: Float
  sentiment: String
  feedback: [Feedback] @hasMany(indexName: "byLogId", fields: ["id"])
}

# Feedback model - Read-write access for user feedback
# This table is managed by InsightSphere
type Feedback @model @auth(rules: [{ allow: private }]) {
  id: ID!
  logId: ID! @index(name: "byLogId", sortKeyFields: ["timestamp"])
  userId: String! @index(name: "byUser", sortKeyFields: ["timestamp"])
  rating: Int!
  thumbsUp: Boolean!
  comment: String
  timestamp: AWSDateTime!
  category: String
  chatLog: ChatLog @belongsTo(fields: ["logId"])
}

# Custom query for aggregated metrics
type MetricsResult {
  accuracy: Float
  satisfaction: Float
  interactionCount: Int
  avgResponseTime: Float
}

# Custom query for feedback statistics
type FeedbackStats {
  positiveCount: Int
  negativeCount: Int
  averageRating: Float
  totalCount: Int
}

type Query {
  getMetrics(startDate: AWSDateTime!, endDate: AWSDateTime!): MetricsResult
    @function(name: "metricsResolver-${env}")
  getFeedbackStats(startDate: AWSDateTime!, endDate: AWSDateTime!): FeedbackStats
    @function(name: "feedbackStatsResolver-${env}")
}
