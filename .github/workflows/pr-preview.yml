name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
      - staging

env:
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Build and test PR
  preview:
    name: Build PR Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type checking
        run: npm run type-check
      
      - name: Run linting
        run: npm run lint
      
      - name: Run tests
        run: npm run test:coverage
      
      - name: Build preview
        run: npm run build:dev
        env:
          VITE_ENV: development
      
      - name: Run pre-deployment checks
        run: npm run predeploy
        continue-on-error: true
      
      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 3
      
      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comment = `## 🚀 PR Preview Build Complete
            
            **Build Status:** ✅ Success
            **PR Number:** #${prNumber}
            **Commit:** ${context.sha.substring(0, 7)}
            
            ### Build Artifacts
            Preview artifacts are available for download in the Actions tab.
            
            ### Next Steps
            - Review the build output
            - Test the changes locally
            - Merge when ready
            
            ---
            *This preview was automatically generated by GitHub Actions*`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: pr-preview
          name: pr-${{ github.event.pull_request.number }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Job 2: Size comparison
  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and analyze
        run: npm run build:analyze
        env:
          VITE_ENV: development
      
      - name: Check bundle size
        run: |
          if [ -f "dist/build-report.json" ]; then
            echo "## 📊 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat dist/build-report.json | jq -r '"**Total Size:** \(.totalSize)\n**Gzipped Size:** \(.totalGzippedSize)\n**Within Limit:** \(.withinLimit)"' >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment bundle size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            
            if (fs.existsSync('dist/build-report.json')) {
              const report = JSON.parse(fs.readFileSync('dist/build-report.json', 'utf8'));
              
              const comment = `## 📊 Bundle Size Report
              
              | Metric | Value |
              |--------|-------|
              | Total Size | ${report.totalSize} |
              | Gzipped Size | ${report.totalGzippedSize} |
              | Size Limit | ${report.sizeLimit} |
              | Within Limit | ${report.withinLimit ? '✅' : '❌'} |
              
              ${report.hasWarnings ? '⚠️ **Warning:** Some bundles exceed recommended size limits.' : '✅ All bundles are within size limits.'}
              
              ---
              *Bundle analysis generated by build-optimize.js*`;
              
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
